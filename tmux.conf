# tmux.conf — optimized for Claude Code, pi.dev, and AI agent monitoring
# tmux 3.6a / macOS

# --- Prefix ---
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- General ---
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g history-limit 50000
set -g mouse on
set -g focus-events on
set -g set-clipboard on
set -g escape-time 0
set -g repeat-time 300
set -g display-time 2000
set -g display-panes-time 2000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# --- Vi mode for navigating long output ---
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# --- Pane splitting (intuitive keys) ---
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
unbind '"'
unbind %

# --- Pane navigation ---
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- Pane resizing ---
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Aggressive resize (useful with multiple terminals watching) ---
setw -g aggressive-resize on

# --- Monitoring & notifications ---
# Alert when output happens in other windows (key for watching agents)
setw -g monitor-activity on
set -g visual-activity off
set -g activity-action other

# Bell passes through so agent completions can signal
set -g monitor-bell on
set -g bell-action any
set -g visual-bell off

# --- Session/window behavior for agent monitoring ---
# Don't auto-rename windows — keep the names you set for agent sessions
setw -g automatic-rename off
setw -g allow-rename off

# Keep windows/panes alive after process exits so you can see final output
set -g remain-on-exit off
# Toggle per-window with: set -w remain-on-exit on

# Don't ask for confirmation on kill (agents can't answer prompts)
bind x kill-pane
bind X kill-window
bind Q kill-session

# --- Quick session/window management for agent workflows ---
# Create a named session for an agent to attach to
bind S command-prompt -p "new agent session:" "new-session -d -s '%%'"

# Rename current session/window
bind n command-prompt -p "rename window:" "rename-window '%%'"
bind N command-prompt -p "rename session:" "rename-session '%%'"

# Quick switch between sessions
bind Space switch-client -n
bind BSpace switch-client -p

# --- Status bar (clean, informative, not distracting) ---
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left

# Colors
set -g status-style "bg=#1a1b26,fg=#a9b1d6"
set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"
set -g message-style "bg=#1a1b26,fg=#7aa2f7"
set -g mode-style "bg=#3b4261,fg=#a9b1d6"

# Left: session name
set -g status-left-length 30
set -g status-left "#[fg=#1a1b26,bg=#7aa2f7,bold] #S #[default] "

# Window list
setw -g window-status-format "#[fg=#565f89] #I:#W "
setw -g window-status-current-format "#[fg=#7aa2f7,bold] #I:#W "
setw -g window-status-activity-style "fg=#e0af68,bold"
setw -g window-status-bell-style "fg=#f7768e,bold"

# Right: pane count + time
set -g status-right-length 50
set -g status-right "#[fg=#565f89] #{window_panes}P #[fg=#a9b1d6]%H:%M "

# --- Reload config ---
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"
